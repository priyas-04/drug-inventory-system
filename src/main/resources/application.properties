# ==========================================
# Application Configuration
# ==========================================
spring.application.name=drug-inventory

# ==========================================
# MySQL Database Configuration
# ==========================================
# Database URL - uses cloud DB_URL if provided, otherwise defaults to localhost
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/drug_inventory_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:priya@7890}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
# 'update' - auto-creates/updates tables based on entities (use 'create' to drop and recreate)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# JWT Security Configuration
# ==========================================
# Secret key for signing JWT tokens (change this to a strong random string in production)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Token validity: 24 hours in milliseconds (24 * 60 * 60 * 1000)
jwt.expiration=86400000

# ==========================================
# Application Settings
# ==========================================
server.port=8080
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Ignore Hibernate proxy fields during JSON serialization
spring.jackson.serialization.fail-on-empty-beans=false

# ==========================================
# Logging
# ==========================================
logging.level.com.drugInventory=DEBUG
logging.level.org.springframework.security=DEBUG
